<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StudySync - Registro</title>
  <link rel="stylesheet" href="/static/app.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <script>
    (function () {
      const theme = localStorage.getItem('theme') || 'dark';
      document.documentElement.setAttribute('data-theme', theme);
    })();
  </script>
</head>
<body>
  <div class="card auth-box">
    <h1 data-i18n="app.nombre">StudySync</h1>
    <p class="subtitle" data-i18n="auth.crear">Crea tu cuenta para comenzar</p>

    <div id="alerta"></div>

    <div class="form-group">
      <label for="nombre" data-i18n="auth.nombre">Nombre completo</label>
      <input type="text" id="nombre" data-i18n-placeholder="auth.nombrePlaceholder" placeholder="Ana Garcia">
    </div>

    <div class="form-group">
      <label for="email" data-i18n="auth.email">Email institucional</label>
      <input type="email" id="email" data-i18n-placeholder="auth.emailPlaceholder" placeholder="ana@upds.edu.bo">
    </div>

    <div class="form-group">
      <label for="password" data-i18n="auth.password">Contrasena</label>
      <input type="password" id="password" data-i18n-placeholder="auth.passwordPlaceholder" placeholder="Minimo 6 caracteres">
    </div>

    <div class="form-group">
      <label for="rol" data-i18n="auth.rol">Rol</label>
      <select id="rol">
        <option value="estudiante" data-i18n="auth.rol.estudiante">Estudiante</option>
        <option value="organizador" data-i18n="auth.rol.organizador">Organizador</option>
        <option value="docente" data-i18n="auth.rol.docente">Docente</option>
      </select>
    </div>

    <button id="registerBtn" class="btn btn-primary" style="width: 100%;" type="button">
      <i class="bi bi-person-plus me-1"></i><span data-i18n="auth.crear">Crear cuenta</span>
    </button>

    <p style="text-align: center; margin-top: 1rem; color: var(--text-secondary); font-size: 0.9rem;">
      <span data-i18n="auth.yaCuenta">Ya tienes cuenta?</span>
      <a href="/static/login.html" style="color: var(--accent-blue);" data-i18n="auth.iniciaSesion">Inicia sesion</a>
    </p>
  </div>

  <div id="toastContainer" class="toast-container position-fixed top-0 end-0 p-3" style="z-index:9999;"></div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/static/i18n.js"></script>
  <script src="/static/ui.js"></script>
  <script src="/static/register.js"></script>
</body>
</html>
