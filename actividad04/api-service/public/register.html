<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StudySync - Registro</title>
  <link rel="stylesheet" href="/static/app.css">
</head>
<body>
  <div class="card auth-box">
    <h1>StudySync</h1>
    <p class="subtitle">Crea tu cuenta para comenzar</p>

    <div id="alerta"></div>

    <div class="form-group">
      <label for="nombre">Nombre completo</label>
      <input type="text" id="nombre" placeholder="Ana Garcia">
    </div>

    <div class="form-group">
      <label for="email">Email institucional</label>
      <input type="email" id="email" placeholder="ana@upds.edu.bo">
    </div>

    <div class="form-group">
      <label for="password">Contrasena</label>
      <input type="password" id="password" placeholder="Minimo 6 caracteres">
    </div>

    <div class="form-group">
      <label for="rol">Rol</label>
      <select id="rol">
        <option value="estudiante">Estudiante</option>
        <option value="organizador">Organizador</option>
        <option value="docente">Docente</option>
      </select>
    </div>

    <button id="registerBtn" class="btn btn-primary" style="width: 100%;" type="button">
      Crear cuenta
    </button>

    <p style="text-align: center; margin-top: 1rem; color: var(--text-secondary); font-size: 0.9rem;">
      Ya tienes cuenta?
      <a href="/static/login.html" style="color: var(--accent-blue);">Inicia sesion</a>
    </p>
  </div>

  <script src="/static/register.js"></script>
</body>
</html>
