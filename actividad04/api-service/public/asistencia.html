<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StudySync - Mi asistencia</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/static/app.css">
</head>
<body>
  <main class="container py-4">
    <div class="card mx-auto" style="max-width: 640px;">
      <h1 class="h4 mb-1" style="color: var(--accent-blue);">Control de asistencia</h1>
      <p class="text-muted-custom mb-3">Marca o desmarca tu asistencia con tu sesion autenticada.</p>

      <div id="alerta"></div>

      <div class="data-card p-3 mb-3">
        <h2 id="tituloSesion" class="h5 mb-1">Cargando sesion...</h2>
        <p id="detalleSesion" class="text-muted-custom mb-0"></p>
      </div>

      <div class="d-flex flex-wrap align-items-center gap-2">
        <button id="toggleBtn" class="btn btn-success" type="button" disabled>Marcar asistencia</button>
        <a class="btn btn-outline-info" href="/static/index.html">Volver al panel</a>
      </div>

      <p id="estado" class="small text-muted-custom mt-3 mb-0"></p>
    </div>
  </main>

  <script src="/static/asistencia.js"></script>
</body>
</html>
