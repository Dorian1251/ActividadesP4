<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StudySync - Mi asistencia</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/static/app.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <script>
    (function () {
      const theme = localStorage.getItem('theme') || 'dark';
      document.documentElement.setAttribute('data-theme', theme);
    })();
  </script>
</head>
<body>
  <main class="container py-3 py-md-4">
    <div class="card mx-auto" style="max-width: 480px;">
      <h1 class="h4 mb-1" style="color: var(--accent-blue);" data-i18n="asistencia.titulo">Control de asistencia</h1>
      <p class="text-muted-custom mb-3" data-i18n="asistencia.subtitulo">Marca o desmarca tu asistencia con tu sesion autenticada.</p>

      <div id="alerta"></div>

      <div class="data-card p-3 mb-3">
        <h2 id="tituloSesion" class="h5 mb-1" data-i18n="asistencia.cargando">Cargando sesion...</h2>
        <p id="detalleSesion" class="text-muted-custom mb-0"></p>
      </div>

      <div class="d-grid d-md-flex flex-wrap align-items-center gap-2">
        <button id="toggleBtn" class="btn btn-success btn-lg w-100 w-md-auto" type="button" disabled>
          <i class="bi bi-check2-square me-1"></i><span data-i18n="asistencia.marcar">Marcar asistencia</span>
        </button>
        <a class="btn btn-outline-info w-100 w-md-auto" href="/static/index.html">
          <i class="bi bi-arrow-left"></i> <span data-i18n="nav.volver">Volver</span>
        </a>
      </div>

      <p id="estado" class="small text-muted-custom mt-3 mb-0"></p>
    </div>
  </main>

  <div id="toastContainer" class="toast-container position-fixed top-0 end-0 p-3" style="z-index:9999;"></div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/static/i18n.js"></script>
  <script src="/static/ui.js"></script>
  <script src="/static/asistencia.js"></script>
</body>
</html>
