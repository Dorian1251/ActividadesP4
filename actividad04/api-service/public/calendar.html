<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StudySync - Calendario</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/static/app.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.css">
  <script>
    (function () {
      const theme = localStorage.getItem('theme') || 'dark';
      document.documentElement.setAttribute('data-theme', theme);
    })();
  </script>
</head>
<body>
  <main class="container py-3 py-md-4">
    <div class="d-flex flex-wrap align-items-center justify-content-between gap-2 mb-3">
      <div>
        <h1 class="h4 mb-0" style="color: var(--accent-blue);" data-i18n="calendar.titulo">Calendario de sesiones</h1>
        <p class="small text-muted-custom mb-0" data-i18n="app.tagline">Eventos</p>
      </div>
      <div class="d-flex flex-wrap gap-2 align-items-center">
        <select id="langSwitcher" class="form-select form-select-sm" style="width:auto;" aria-label="Idioma">
          <option value="es">ES</option>
          <option value="en">EN</option>
        </select>
        <button id="themeToggle" class="btn btn-outline-secondary btn-sm" type="button">
          <i class="bi bi-moon-stars" id="themeIcon"></i>
        </button>
        <a class="btn btn-outline-info btn-sm" href="/static/index.html">
          <i class="bi bi-arrow-left"></i> <span data-i18n="nav.volver">Volver</span>
        </a>
      </div>
    </div>

    <div class="panel-card p-3">
      <div id="calendar"></div>
    </div>
  </main>

  <div id="toastContainer" class="toast-container position-fixed top-0 end-0 p-3" style="z-index:9999;"></div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.js"></script>
  <script src="/socket.io/socket.io.js"></script>
  <script src="/static/i18n.js"></script>
  <script src="/static/ui.js"></script>
  <script src="/static/calendar.js"></script>
</body>
</html>
