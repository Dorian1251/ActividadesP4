<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StudySync - QR de asistencia</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/static/app.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <script>
    (function () {
      const theme = localStorage.getItem('theme') || 'dark';
      document.documentElement.setAttribute('data-theme', theme);
    })();
  </script>
</head>
<body>
  <main class="container py-3 py-md-4">
    <div class="card mx-auto" style="max-width: 480px;">
      <div class="d-flex flex-wrap justify-content-between gap-3 mb-3">
        <div>
          <h1 class="h4 mb-1" style="color: var(--accent-blue);" data-i18n="qr.titulo">QR de asistencia</h1>
          <p id="descripcion" class="text-muted-custom mb-0" data-i18n="qr.descripcion">Generando codigo QR...</p>
        </div>
        <a class="btn btn-outline-info btn-sm align-self-start" href="/static/index.html">
          <i class="bi bi-arrow-left"></i> <span data-i18n="nav.volver">Volver</span>
        </a>
      </div>

      <div id="alerta"></div>

      <div class="row g-3 align-items-center">
        <div class="col-12 col-md-5 text-center">
          <img id="qrImage" class="img-fluid rounded bg-white p-2 d-none" alt="Codigo QR de asistencia" style="width:100%;max-width:320px;">
        </div>
        <div class="col-12 col-md-7">
          <h2 id="tituloSesion" class="h5" data-i18n="qr.sesion">Sesion</h2>
          <p id="detalleSesion" class="text-muted-custom"></p>
          <label class="form-label" for="asistenciaUrl" data-i18n="qr.urlLabel">URL del QR</label>
          <textarea id="asistenciaUrl" class="form-control" rows="4" readonly></textarea>
          <div class="d-grid d-md-flex flex-wrap gap-2 mt-3">
            <button id="copyBtn" class="btn btn-primary" type="button">
              <i class="bi bi-clipboard me-1"></i><span data-i18n="qr.copiar">Copiar URL</span>
            </button>
            <a id="openAttendance" class="btn btn-success" href="#">
              <i class="bi bi-check2-square me-1"></i><span data-i18n="qr.abrir">Abrir asistencia</span>
            </a>
          </div>
        </div>
      </div>
    </div>
  </main>

  <div id="toastContainer" class="toast-container position-fixed top-0 end-0 p-3" style="z-index:9999;"></div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/static/i18n.js"></script>
  <script src="/static/ui.js"></script>
  <script src="/static/qr.js"></script>
</body>
</html>
