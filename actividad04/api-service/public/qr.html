<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StudySync - QR de asistencia</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/static/app.css">
</head>
<body>
  <main class="container py-4">
    <div class="card mx-auto" style="max-width: 720px;">
      <div class="d-flex flex-wrap justify-content-between gap-3 mb-3">
        <div>
          <h1 class="h4 mb-1" style="color: var(--accent-blue);">QR de asistencia</h1>
          <p id="descripcion" class="text-muted-custom mb-0">Generando codigo QR...</p>
        </div>
        <a class="btn btn-outline-info btn-sm align-self-start" href="/static/index.html">Volver al panel</a>
      </div>

      <div id="alerta"></div>

      <div class="row g-3 align-items-center">
        <div class="col-12 col-md-5 text-center">
          <img id="qrImage" class="img-fluid rounded bg-white p-2 d-none" alt="Codigo QR de asistencia">
        </div>
        <div class="col-12 col-md-7">
          <h2 id="tituloSesion" class="h5">Sesion</h2>
          <p id="detalleSesion" class="text-muted-custom"></p>
          <label class="form-label" for="asistenciaUrl">URL del QR</label>
          <textarea id="asistenciaUrl" class="form-control" rows="4" readonly></textarea>
          <div class="d-flex flex-wrap gap-2 mt-3">
            <button id="copyBtn" class="btn btn-primary" type="button">Copiar URL</button>
            <a id="openAttendance" class="btn btn-success" href="#">Abrir asistencia</a>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script src="/static/qr.js"></script>
</body>
</html>
